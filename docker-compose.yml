version: '3.8'

services:
  comfyui:
    build:
      context: .
      dockerfile: deployment/docker/Dockerfile.comfyui
    image: ai-girlfriend-comfyui:latest
    container_name: comfyui
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - CUDA_VISIBLE_DEVICES=0
      - DOWNLOAD_MODELS=false
      - WAVESPEED_CACHE=true
      - WAVESPEED_CACHE_STRENGTH=0.15
    ports:
      - "8188:8188"
    volumes:
      - ./ComfyUI/models:/workspace/ComfyUI/models
      - ./ComfyUI/output:/workspace/ComfyUI/output
      - ./ComfyUI/custom_nodes:/workspace/ComfyUI/custom_nodes
      - ./workflows:/workspace/ComfyUI/workflows
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8188/system_stats"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped

  cosyvoice:
    build:
      context: ../CosyVoice
      dockerfile: docker/Dockerfile
    image: cosyvoice:latest
    container_name: cosyvoice
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - CUDA_VISIBLE_DEVICES=0
    ports:
      - "50000:50000"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: ai-girlfriend-backend:latest
    container_name: backend
    environment:
      - DEBUG=false
      - LOG_LEVEL=INFO
      - COMFYUI_URL=http://comfyui:8188
      - COMFYUI_WS_URL=ws://comfyui:8188/ws
      - WORKFLOW_DIR=/app/workflows
      - OUTPUT_DIR=/app/outputs
      - OLLAMA_HOST=http://ollama:11434
      - COSYVOICE_SERVER=http://cosyvoice:50000
    ports:
      - "8000:8000"
    volumes:
      - ./workflows:/app/workflows
      - ./backend/outputs:/app/outputs
      - ./backend/data:/app/data
    depends_on:
      comfyui:
        condition: service_healthy
      ollama:
        condition: service_started
      cosyvoice:
        condition: service_started
    restart: unless-stopped

  # Optional: Redis for scaling
  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    profiles:
      - scaling

volumes:
  ollama_data:
  redis_data:
